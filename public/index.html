<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phase 1 AI Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Graduate Course Project</p>
        <h1>Phase 1 AI Agent</h1>
        <p class="lede">
          A LangChain and LangGraph-based chat agent with calculator and web search tools.
        </p>
      </section>

      <section class="chat-panel" aria-label="Chat interface">
        <div class="panel-header">
          <div>
            <h2>Agent Chat</h2>
            <p id="status" class="status" aria-live="polite">Ready</p>
          </div>
          <div class="pill-row">
            <span class="pill">calculator</span>
            <span class="pill">web_search</span>
          </div>
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <label class="sr-only" for="message">Message</label>
          <textarea
            id="message"
            name="message"
            rows="3"
            placeholder="Ask a math question or something current."
            required
          ></textarea>
          <div class="composer-actions">
            <button id="submit-button" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
